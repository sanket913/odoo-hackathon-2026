services:
  mysql:
    image: mysql:8.4
    container_name: transitops-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: transitops
      MYSQL_USER: transitops
      MYSQL_PASSWORD: transitops_password
      MYSQL_ROOT_PASSWORD: transitops_root_password
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    ports:
      - "3306:3306"
    volumes:
      - transitops_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -utransitops -ptransitops_password --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
volumes:
  transitops_mysql_data:
